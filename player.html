<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AudioProctor</title>
  <style>
    :root {
      --ink:    #1a1a2e;
      --paper:  #f8f5ef;
      --accent: #c0392b;
      --muted:  #6b6560;
      --warm-mid: #e8e0d0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 300;
      line-height: 1.7;
      user-select: none;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--ink);
      flex-shrink: 0;
    }

    .wordmark {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .wordmark .accent { color: var(--accent); }

    .top-bar__filename {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Player card ── */
    .player-card {
      border: 1px solid var(--ink);
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    /* ── Audio controls ── */
    .audio-controls { margin-bottom: 2rem; }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    input[type="range"] {
      flex: 1;
      height: 4px;
      background: var(--warm-mid);
      cursor: pointer;
      appearance: none;
      border: none;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--ink);
      cursor: pointer;
    }

    .time-display {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-btn:hover { opacity: 0.85; }

    .ctrl-btn {
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
    }

    .ctrl-btn:hover { opacity: 0.7; }

    select {
      border: 1px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.8rem;
      padding: 0.35rem 0.5rem;
      cursor: pointer;
    }

    /* ── Exit section ── */
    .exit-section {
      border-top: 1px solid var(--warm-mid);
      padding-top: 1.5rem;
    }

    .exit-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      display: block;
      margin-bottom: 0.6rem;
    }

    .exit-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .exit-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .exit-input {
      flex: 1;
      border: 1px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 1rem;
      padding: 0.6rem 0.75rem;
    }

    .exit-input:focus { outline: 2px solid var(--ink); outline-offset: 1px; }

    .exit-btn {
      padding: 0.6rem 1.25rem;
      background: var(--accent);
      color: white;
      border: 1px solid var(--accent);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .exit-btn:hover { opacity: 0.85; }

    .exit-error {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--accent);
      display: none;
    }

    /* ── Error / loading states ── */
    #state-loading, #state-error {
      text-align: center;
    }

    .state-label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .state-label.error { color: var(--accent); }

    .hidden { display: none !important; }

    /* ── Text reader ── */
    .text-reader-card {
      border: 1px solid var(--ink);
      padding: 2.5rem;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 12rem);
    }

    .text-reader-header {
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .text-reader-help {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--warm-mid);
      flex-shrink: 0;
    }

    .text-reader-help p { margin-bottom: 0.3rem; }
    .text-reader-help p:last-child { margin-bottom: 0; }
    .text-reader-help strong { color: var(--ink); font-weight: 600; }

    #text-paragraphs {
      flex: 1;
      overflow-y: auto;
      font-size: 1.15rem;
      line-height: 1.8;
      word-wrap: break-word;
      padding: 1.5rem;
      border: 1px solid var(--warm-mid);
      background: white;
      user-select: text;
      cursor: text;
    }

    #text-paragraphs:focus {
      outline: 2px solid var(--ink);
      outline-offset: 1px;
    }

    /* ── Read aloud controls ── */
    .read-aloud-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .read-aloud-controls .play-btn {
      width: 40px;
      height: 40px;
      font-size: 1rem;
    }

    .read-aloud-controls .ctrl-btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
    }

    .read-aloud-controls select {
      font-size: 0.75rem;
      padding: 0.3rem 0.4rem;
      max-width: 140px;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .read-aloud-status {
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: auto;
    }

    #text-paragraphs p {
      margin-bottom: 0.8rem;
      padding: 0.2rem 0.4rem;
      border-left: 3px solid transparent;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    #text-paragraphs p.tts-active {
      border-left-color: var(--accent);
      background: rgba(192, 57, 43, 0.06);
    }

    /* ── Display settings ── */
    .display-settings {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }

    .display-settings .ctrl-btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
    }

    .display-settings .ctrl-btn.active {
      background: var(--ink);
      color: var(--paper);
    }

    .text-reader-card.fullwidth {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Top bar -->
    <div class="top-bar">
      <span class="wordmark">Audio<span class="accent">Proctor</span></span>
      <span class="top-bar__filename" id="top-filename"></span>
    </div>

    <!-- Main content -->
    <div class="main">

      <!-- Loading -->
      <div id="state-loading">
        <p class="state-label" data-i18n="player.loading"></p>
      </div>

      <!-- Error -->
      <div id="state-error" class="hidden">
        <p class="state-label error" id="error-msg" data-i18n="player.somethingWrong"></p>
        <button class="ctrl-btn" id="btn-retry" style="margin: 1.5rem auto 0; display: block;" data-i18n="player.tryAgain"></button>
      </div>

      <!-- Player -->
      <div id="state-player" class="player-card hidden">

        <!-- Playback controls -->
        <div class="audio-controls">
          <div class="progress-row">
            <input type="range" id="progress-bar" value="0" min="0" step="0.1">
            <span class="time-display">
              <span id="time-current">0:00</span> / <span id="time-total">0:00</span>
            </span>
          </div>
          <div class="controls-row">
            <button class="play-btn" id="btn-play" data-i18n-title="player.playPauseTitle">&#9654;</button>
            <button class="ctrl-btn" id="btn-rewind" data-i18n="player.rewind" data-i18n-title="player.rewindTitle"></button>
            <select id="speed-select" data-i18n-title="player.speedLabel">
              <option value="0.75">0.75×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
            </select>
          </div>
        </div>

      </div>

      <!-- Text reader -->
      <div id="state-text" class="text-reader-card hidden">
        <div class="text-reader-header">
          <p class="state-label" data-i18n="player.textAssessment"></p>
        </div>

        <!-- Read Aloud controls -->
        <div class="read-aloud-controls">
          <button class="play-btn" id="btn-tts-play" data-i18n-title="player.tts.readAloud">&#9654;</button>
          <button class="ctrl-btn" id="btn-tts-prev" data-i18n-title="player.tts.previousLabel">&#8593;</button>
          <button class="ctrl-btn" id="btn-tts-next" data-i18n-title="player.tts.nextLabel">&#8595;</button>
          <select id="tts-speed" data-i18n-title="player.tts.speedLabel">
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
          </select>
          <select id="tts-voice" data-i18n-title="player.tts.voice">
            <option value="" data-i18n="player.tts.defaultVoice"></option>
          </select>
          <span class="read-aloud-status" id="tts-status"></span>
        </div>

        <!-- Display settings -->
        <div class="display-settings">
          <button class="ctrl-btn" id="btn-font-down" data-i18n-title="player.tts.fontSizeDown">A&minus;</button>
          <button class="ctrl-btn" id="btn-font-up" data-i18n-title="player.tts.fontSizeUp">A+</button>
          <button class="ctrl-btn" id="btn-fullwidth" data-i18n="player.tts.fullWidth" data-i18n-title="player.tts.toggleFullWidth"></button>
        </div>

        <div class="text-reader-help">
          <p id="tts-instructions"><strong data-i18n="player.tts.readAloud"></strong>: <span data-i18n="player.tts.instructions"></span></p>
        </div>

        <div id="text-paragraphs" tabindex="0"></div>
      </div>
    </div>

    <!-- Exit section — always visible regardless of loading/error/player state -->
    <div class="exit-section" style="padding: 1.5rem 2rem; max-width: 560px; margin: 0 auto; width: 100%;">
      <span class="exit-label" data-i18n="player.exitWordPrompt"></span>
      <p class="exit-hint" id="exit-hint" data-i18n="player.exitHint"></p>
      <div class="exit-row">
        <input
          type="text"
          id="exit-input"
          class="exit-input"
          data-i18n-placeholder="player.exitWordPlaceholder"
          autocomplete="off"
          spellcheck="false"
        >
        <button class="exit-btn" id="btn-exit" data-i18n="player.submit"></button>
      </div>
      <p id="exit-error" class="exit-error"></p>
    </div>
  </div>

  <script src="lib/sanitize.js"></script>
  <script src="lib/i18n.js"></script>
  <script>
    // Apply translations to DOM elements with data-i18n attributes
    (async () => {
      try {
        await window.i18nReady;
      } catch (e) {
        console.warn('[player.html] i18n init failed, using defaults', e);
      }
      // data-i18n → textContent
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        el.textContent = window.t ? window.t(key) : key;
      });
      // data-i18n-title → title attribute
      document.querySelectorAll('[data-i18n-title]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-title');
        el.title = window.t ? window.t(key) : key;
      });
      // data-i18n-placeholder → placeholder attribute
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-placeholder');
        el.placeholder = window.t ? window.t(key) : key;
      });
    })();
  </script>
  <script src="player.js"></script>
</body>
</html>
