<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AudioProctor</title>
  <style>
    :root {
      --ink:    #1a1a2e;
      --paper:  #f8f5ef;
      --accent: #c0392b;
      --muted:  #6b6560;
      --border: 1px solid #1a1a2e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 300;
      width: 300px;
      padding: 1.5rem 1.5rem 0.75rem;
    }

    .wordmark {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 700;
      font-size: 1.2rem;
      display: block;
      margin-bottom: 1.25rem;
    }

    .wordmark .accent { color: var(--accent); }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      display: block;
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      border: var(--border);
      background: var(--paper);
      color: var(--ink);
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    input[type="text"]:focus {
      outline: 2px solid var(--ink);
      outline-offset: 1px;
    }

    button {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--ink);
      color: var(--paper);
      border: var(--border);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      font-size: 0.8rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      background: #fdf0ee;
      padding: 0.5rem 0.6rem;
      display: none;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
      display: block;
    }

    /* ── Language Toggle ── */
    .popup-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid #e0dbd0;
    }
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
    }
    .lang-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.2rem 0.3rem;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
    }
    .lang-btn.active {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .lang-btn:hover { color: var(--ink); }
    .lang-sep {
      color: var(--muted);
      user-select: none;
    }
  </style>
</head>
<body>
  <span class="wordmark">Audio<span class="accent">Proctor</span></span>

  <span class="label" id="lbl-code"></span>
  <input
    type="text"
    id="code-input"
    maxlength="20"
    autocomplete="off"
    spellcheck="false"
  >

  <button id="btn-begin"></button>

  <div id="error-msg" class="error-msg"></div>

  <span class="hint" id="hint"></span>

  <div class="popup-footer">
    <span class="lang-toggle" id="lang-toggle"></span>
  </div>

  <script src="lib/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
